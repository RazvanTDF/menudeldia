<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú del Día — Fortaleza 1786</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }

  :root {
    --line-size: 24px;
    --line-gap: 1px;
    --section-gap: 10px;
    --section-title-size: 24px;
    --extra-size: 19px;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: #e9ecef;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #1a1a1a;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* ---------- TOOLBAR (no se imprime) ---------- */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #2c3e50;
    color: white;
    padding: 10px 20px;
    display: flex;
    gap: 14px;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .toolbar .title {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    letter-spacing: 1px;
    flex: 0 0 auto;
  }

  .toolbar .hint {
    flex: 1;
    text-align: center;
    font-size: 15px;
    opacity: 0.9;
  }

  .toolbar .buttons {
    display: flex;
    gap: 10px;
    flex: 0 0 auto;
  }

  .btn {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    padding: 8px 22px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .btn:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.25); }
  .btn:active { transform: translateY(0); }

  .btn-print {
    background: #27ae60;
    color: white;
    font-size: 20px;
    padding: 10px 28px;
  }

  .btn-clear {
    background: #c0392b;
    color: white;
  }

  /* ---------- PÁGINA A4 ---------- */
  .page {
    width: 210mm;
    height: 297mm;
    margin: 20px auto;
    background: white;
    padding: 12mm 14mm;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Watermark con background-image + opacidad */
  .page::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 140%;
    height: 80%;
    background-image: url('logo.jpeg');
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;
    opacity: 0.07;
    pointer-events: none;
    z-index: 0;
  }

  .page > * { position: relative; z-index: 2; }

  /* ---------- HEADER ---------- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding-bottom: 4px;
  }

  .logo-box {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-img {
    height: 68px;
    width: auto;
  }

  .brand {
    font-family: 'Cinzel', serif;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #1a1a1a;
  }

  .qr-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    line-height: 1.2;
  }
  .qr-box img { width: 58px; height: 58px; display: block; }

  /* ---------- TÍTULO ---------- */
  .menu-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 700;
    margin: 8px 0 2px 0;
  }
  .menu-title .es {
    text-decoration: underline;
    text-underline-offset: 4px;
  }
  .menu-title .eu {
    font-style: italic;
    font-weight: 500;
  }

  /* ---------- FECHA ---------- */
  .date-line {
    text-align: right;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    color: #555;
    font-style: italic;
    margin-bottom: 2px;
  }

  /* ---------- SECCIONES ---------- */
  .menu-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: var(--section-gap);
    margin-top: 8px;
    min-height: 0;
  }

  .section {
    display: flex;
    flex-direction: column;
    gap: var(--line-gap);
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: var(--section-title-size);
    font-weight: 700;
    letter-spacing: 3px;
    color: #1a1a1a;
    margin-bottom: 3px;
  }

  .line-row {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
  }

  .line {
    font-family: 'Cormorant Garamond', serif;
    font-size: var(--line-size);
    font-weight: 700;
    line-height: 1.35;
    padding: 2px 6px;
    border: none;
    outline: none;
    background: transparent;
    flex: 1;
    min-width: 0;
    border-radius: 4px;
    color: #1a1a1a;
    transition: background 0.15s;
    -webkit-text-stroke: 0.5px #1a1a1a;
    text-rendering: geometricPrecision;
  }

  .line:hover { background: rgba(245,245,245,0.7); }
  .line:focus { background: #fff8dc; box-shadow: 0 0 0 2px #f39c12 inset; }
  .line::placeholder { color: #c8c8c8; font-style: italic; }

  /* Botón eliminar línea (sólo pantalla) */
  .line-remove {
    flex: 0 0 auto;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid #d0d4d9;
    background: #fff;
    color: #c0392b;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, transform 0.1s;
    padding: 0;
    line-height: 1;
  }
  .line-row:hover .line-remove,
  .line-row:focus-within .line-remove { opacity: 1; }
  .line-remove:hover { background: #c0392b; color: #fff; }
  .line-remove:active { transform: scale(0.92); }
  .line-row.is-locked .line-remove { display: none; }

  /* Botón añadir línea */
  .section-add-row {
    display: flex;
    justify-content: flex-start;
    margin-top: 2px;
  }
  .btn-add {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-weight: 600;
    color: #2c3e50;
    background: transparent;
    border: 1px dashed #97a3b0;
    border-radius: 20px;
    padding: 4px 14px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .btn-add:hover:not(:disabled) { background: #2c3e50; color: #fff; border-color: #2c3e50; }
  .btn-add:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Línea extra (incluye) */
  .extra-line {
    margin-top: 8px;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: var(--extra-size);
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: 1px;
  }

  .extra-line input {
    text-align: center;
    font-family: inherit;
    font-size: inherit;
    font-weight: inherit;
    letter-spacing: inherit;
    color: inherit;
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    padding: 4px;
    border-radius: 4px;
  }
  .extra-line input:hover { background: rgba(245,245,245,0.7); }
  .extra-line input:focus { background: #fff8dc; box-shadow: 0 0 0 2px #f39c12 inset; }
  .extra-line input::placeholder { color: #c8c8c8; font-style: italic; }

  /* ---------- FOOTER ALÉRGENOS ---------- */
  .allergens {
    margin-top: 10px;
  }
  .allergens img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ---------- PRINT ---------- */
  @media print {
    @page { size: A4 portrait; margin: 0; }
    html, body {
      background: white;
      width: 210mm;
      height: 297mm;
    }
    .toolbar { display: none !important; }
    .section-add-row { display: none !important; }
    .line-remove { display: none !important; }
    .page {
      margin: 0 !important;
      box-shadow: none !important;
      width: 210mm !important;
      height: 297mm !important;
      padding: 12mm 14mm !important;
      page-break-after: avoid;
      page-break-inside: avoid;
      break-after: avoid;
      break-inside: avoid;
      overflow: hidden !important;
    }
    .line:hover, .line:focus,
    .extra-line input:hover, .extra-line input:focus { background: transparent; box-shadow: none; }
    .line::placeholder, .extra-line input::placeholder {
      color: transparent;
      -webkit-text-stroke: 0 transparent;
    }
    .page::before {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
  }

  /* ---------- RESPONSIVE (sólo pantalla pequeña) ---------- */
  @media screen and (max-width: 900px) {
    .page { width: 100%; height: auto; min-height: 100vh; margin: 0; padding: 16px; box-shadow: none; }
    .brand { font-size: 26px; }
    .menu-title { font-size: 22px; }
    .section-title { font-size: 17px; letter-spacing: 2px; }
    .line { font-size: 16px; }
    .extra-line { font-size: 15px; }
    .logo-img { height: 50px; }
    .toolbar { flex-wrap: wrap; padding: 8px 12px; }
    .toolbar .title { display: none; }
    .toolbar .hint { order: 3; width: 100%; font-size: 12px; }
    .line-remove { opacity: 1; }
  }
</style>
</head>
<body>

<!-- BARRA SUPERIOR -->
<div class="toolbar">
  <div class="title">FORTALEZA 1786</div>
  <div class="hint">✍️ Haz clic en cualquier línea para escribir. Usa <strong>+ Añadir</strong> para más platos (máx. 6). Se guarda automáticamente.</div>
  <div class="buttons">
    <button class="btn btn-clear" onclick="limpiar()">🗑 LIMPIAR</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ IMPRIMIR MENÚ</button>
  </div>
</div>

<!-- PÁGINA -->
<div class="page" id="page">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-box">
      <img src="logo.jpeg" class="logo-img" alt="Fortaleza 1786">
      <div class="brand">FORTALEZA 1786</div>
    </div>
    <div class="qr-box">
      <div>menú</div>
      <img src="download.png" alt="QR">
      <div>digital</div>
    </div>
  </div>

  <!-- TÍTULO -->
  <div class="menu-title">
    <span class="es">MENÚ DEL DÍA</span> <strong>/</strong> <span class="eu">EGUNEKO MENUA</span>
  </div>

  <div class="date-line" id="fecha"></div>

  <!-- CONTENIDO -->
  <div class="menu-content" id="menu-content">

    <div class="section" data-section="p">
      <div class="section-title">PRIMERO</div>
      <div class="lines"></div>
      <div class="section-add-row">
        <button type="button" class="btn-add" data-add="p">+ Añadir plato</button>
      </div>
    </div>

    <div class="section" data-section="s">
      <div class="section-title">SEGUNDO</div>
      <div class="lines"></div>
      <div class="section-add-row">
        <button type="button" class="btn-add" data-add="s">+ Añadir plato</button>
      </div>
    </div>

    <div class="section" data-section="d">
      <div class="section-title">POSTRE</div>
      <div class="lines"></div>
      <div class="section-add-row">
        <button type="button" class="btn-add" data-add="d">+ Añadir postre</button>
      </div>
    </div>
  </div>

  <!-- LÍNEA EXTRA -->
  <div class="extra-line">
    <input type="text" data-key="extra" placeholder="PAN, AGUA, VINO O SIDRA Y CAFÉ — 16,50 €" value="PAN, AGUA, VINO O SIDRA Y CAFÉ — 16,50 €">
  </div>

  <!-- ALÉRGENOS -->
  <div class="allergens">
    <img src="alergenos.png" alt="Información de alérgenos">
  </div>

</div>

<script>
  // ---------- Fecha ----------
  const fecha = new Date();
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  document.getElementById('fecha').textContent =
    dias[fecha.getDay()].charAt(0).toUpperCase() + dias[fecha.getDay()].slice(1) +
    ', ' + fecha.getDate() + ' de ' + meses[fecha.getMonth()] + ' de ' + fecha.getFullYear();

  // ---------- Config ----------
  const SECTIONS = ['p', 's', 'd'];
  const PLACEHOLDERS = { p: 'Plato', s: 'Plato', d: 'Postre' };
  const DEFAULT_COUNT = 4;
  const MAX_COUNT = 6;
  const MIN_COUNT = 1;

  const page = document.getElementById('page');

  // ---------- Persistencia ----------
  const loadValue  = k => localStorage.getItem('menu_' + k);
  const saveValue  = (k, v) => localStorage.setItem('menu_' + k, v);
  const removeValue = k => localStorage.removeItem('menu_' + k);

  function loadCount(section) {
    const raw = parseInt(localStorage.getItem('menu_count_' + section), 10);
    if (isNaN(raw)) return DEFAULT_COUNT;
    return Math.min(MAX_COUNT, Math.max(MIN_COUNT, raw));
  }
  const saveCount = (section, count) => localStorage.setItem('menu_count_' + section, String(count));

  // ---------- Render ----------
  const sectionEl = s => document.querySelector('.section[data-section="' + s + '"]');
  const linesEl   = s => sectionEl(s).querySelector('.lines');
  const addBtn    = s => sectionEl(s).querySelector('.btn-add');

  function buildRow(section, index) {
    const row = document.createElement('div');
    row.className = 'line-row';
    if (index === 0) row.classList.add('is-locked');

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'line';
    const key = section + (index + 1);
    input.dataset.key = key;
    input.placeholder = PLACEHOLDERS[section] + ' ' + (index + 1) + '...';
    const saved = loadValue(key);
    if (saved !== null) input.value = saved;
    input.addEventListener('input', () => saveValue(key, input.value));

    const remove = document.createElement('button');
    remove.type = 'button';
    remove.className = 'line-remove';
    remove.title = 'Eliminar esta línea';
    remove.setAttribute('aria-label', 'Eliminar línea');
    remove.textContent = '×';
    remove.addEventListener('click', () => removeLine(section, index));

    row.appendChild(input);
    row.appendChild(remove);
    return row;
  }

  function renderSection(section) {
    const container = linesEl(section);
    container.innerHTML = '';
    const count = loadCount(section);
    for (let i = 0; i < count; i++) container.appendChild(buildRow(section, i));
    addBtn(section).disabled = count >= MAX_COUNT;
  }

  function addLine(section) {
    const count = loadCount(section);
    if (count >= MAX_COUNT) return;
    const newCount = count + 1;
    saveCount(section, newCount);
    renderSection(section);
    adjustSizing();
    const inputs = linesEl(section).querySelectorAll('.line');
    if (inputs[newCount - 1]) inputs[newCount - 1].focus();
  }

  function removeLine(section, index) {
    const count = loadCount(section);
    if (count <= MIN_COUNT) return;
    const values = [];
    for (let i = 0; i < count; i++) values.push(loadValue(section + (i + 1)) || '');
    values.splice(index, 1);
    for (let i = 0; i < count; i++) removeValue(section + (i + 1));
    for (let i = 0; i < values.length; i++) {
      if (values[i]) saveValue(section + (i + 1), values[i]);
    }
    saveCount(section, values.length);
    renderSection(section);
    adjustSizing();
  }

  document.querySelectorAll('.btn-add').forEach(btn => {
    btn.addEventListener('click', () => addLine(btn.dataset.add));
  });

  // ---------- Auto-ajuste de tamaño ----------
  // Total de líneas (3..18) -> tamaños que siempre caben en A4 sin columnas
  function adjustSizing() {
    const total = SECTIONS.reduce((sum, s) => sum + loadCount(s), 0);
    let lineSize, lineGap, sectionGap, sectionTitle, extraSize;
    if (total <= 12) {
      lineSize = 24; lineGap = 1; sectionGap = 10; sectionTitle = 24; extraSize = 19;
    } else if (total <= 14) {
      lineSize = 22; lineGap = 1; sectionGap = 9;  sectionTitle = 23; extraSize = 18;
    } else if (total <= 16) {
      lineSize = 20; lineGap = 1; sectionGap = 8;  sectionTitle = 21; extraSize = 17;
    } else {
      lineSize = 18; lineGap = 0; sectionGap = 7;  sectionTitle = 20; extraSize = 16;
    }
    page.style.setProperty('--line-size', lineSize + 'px');
    page.style.setProperty('--line-gap', lineGap + 'px');
    page.style.setProperty('--section-gap', sectionGap + 'px');
    page.style.setProperty('--section-title-size', sectionTitle + 'px');
    page.style.setProperty('--extra-size', extraSize + 'px');
  }

  // ---------- Línea extra ----------
  const extraInput = document.querySelector('[data-key="extra"]');
  const extraSaved = loadValue('extra');
  if (extraSaved !== null) extraInput.value = extraSaved;
  extraInput.addEventListener('input', () => saveValue('extra', extraInput.value));

  // ----------  ----------
  SECTIONS.forEach(renderSection);
  adjustSizing();

  // ---------- Limpiar ----------
  function limpiar() {
    if (!confirm('¿Seguro que quieres borrar todo el menú?')) return;
    SECTIONS.forEach(s => {
      for (let i = 0; i < MAX_COUNT; i++) removeValue(s + (i + 1));
      saveCount(s, DEFAULT_COUNT);
      renderSection(s);
    });
    extraInput.value = 'PAN, AGUA, VINO O SIDRA Y CAFÉ — 16,50 €';
    removeValue('extra');
    adjustSizing();
  }
  window.limpiar = limpiar;
</script>

</body>
</html>
